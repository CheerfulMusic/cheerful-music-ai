<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cheerful Music AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0c1018;
  color:#fff;
}
.wrap{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* 顶部 */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.brandtitle{
  font-size:28px;
  font-weight:900;
  color:#F93822;
}
.brandsub{
  font-size:12px;
  color:#aaa;
}

/* 按钮 */
button{
  padding:10px;
  border-radius:8px;
  border:none;
  cursor:pointer;
}
.mainbtn{
  background:#F93822;
  color:#fff;
}
.mainbtn:hover{
  background:#d9331f;
}
.subbtn{
  background:#1c2436;
  color:#fff;
}

/* 卡片 */
.card{
  background:#121a2b;
  border-radius:12px;
  padding:20px;
  margin-top:20px;
}
input,textarea,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  background:#0e1626;
  color:#fff;
  border:1px solid #333;
}

/* 布局 */
.hidden{display:none}
.dashboard{
  display:grid;
  grid-template-columns:240px 1fr;
  gap:20px;
}
.sidebar{
  background:#121a2b;
  border-radius:12px;
  padding:15px;
}
.menu{
  margin-top:10px;
}
.menu button{
  width:100%;
  margin-top:6px;
}
.main{
  display:block;
}
.section{
  margin-top:20px;
}
.footer{
  margin-top:30px;
  text-align:center;
}
.footer a{
  color:#F93822;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="wrap">

<div class="topbar">
  <div>
    <div class="brandtitle">Cheerful Music AI</div>
    <div class="brandsub">Team System</div>
  </div>
  <div>
    <button onclick="setLang('zh')">中文</button>
    <button onclick="setLang('en')">EN</button>
  </div>
</div>

<!-- 登录 -->
<div id="login">
  <div class="card">
    <h2 id="loginTitle"></h2>
    <input id="email" placeholder="email"/>
    <input id="password" type="password" placeholder="password"/>

    <select id="role">
      <option value="admin">Admin</option>
      <option value="member">Member</option>
    </select>

    <button class="mainbtn" onclick="login()" id="loginBtn"></button>
  </div>
</div>

<!-- 系统 -->
<div id="app" class="hidden dashboard">

<div class="sidebar">
  <div>Menu</div>
  <div class="menu">
    <button onclick="show('create')">Create</button>
    <button onclick="show('history')">History</button>
    <button id="adminBtn" onclick="show('admin')">Admin</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="main">

<!-- 创作 -->
<div id="create" class="section">
  <div class="card">
    <h2>Create</h2>

    <textarea id="emotion"></textarea>

    <select id="platform">
      <option value="douyin">Douyin</option>
      <option value="tiktok">TikTok</option>
    </select>

    <select id="style">
      <option>孤独治愈</option>
      <option>女性情绪</option>
      <option>励志成长</option>
    </select>

    <button class="mainbtn" onclick="gen()">Generate</button>

    <div id="prompt"></div>

    <button class="subbtn" onclick="save()">Save</button>
  </div>
</div>

<!-- 历史 -->
<div id="history" class="section hidden">
  <div class="card">
    <h2>History</h2>
    <div id="historyList"></div>
  </div>
</div>

<!-- 管理员 -->
<div id="admin" class="section hidden">
  <div class="card">
    <h2>Team</h2>
    <div>snow@cheerfulmusic.com</div>
    <div>member1</div>
    <div>member2</div>
    <div>member3</div>
  </div>
</div>

<div class="footer">
  <a href="https://app.cheerfulmusic.com" target="_blank">
    Open Cheerful Music System →
  </a>
</div>

</div>
</div>

</div>

<script>
let lang="zh"
let user=null

const text={
zh:{
loginTitle:"登录",
loginBtn:"进入系统"
},
en:{
loginTitle:"Login",
loginBtn:"Enter"
}
}

function setLang(l){
lang=l
render()
}

function render(){
document.getElementById("loginTitle").innerText=text[lang].loginTitle
document.getElementById("loginBtn").innerText=text[lang].loginBtn
}

function login(){
let email=document.getElementById("email").value||"member"
let role=document.getElementById("role").value
user={email,role}

document.getElementById("login").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

if(role!="admin"){
document.getElementById("adminBtn").style.display="none"
}

loadHistory()
}

function logout(){
location.reload()
}

function show(id){
document.getElementById("create").classList.add("hidden")
document.getElementById("history").classList.add("hidden")
document.getElementById("admin").classList.add("hidden")
document.getElementById(id).classList.remove("hidden")
}

function gen(){
let e=document.getElementById("emotion").value
let p="very short emotional piano, "+e
document.getElementById("prompt").innerText=p
}

function save(){
let e=document.getElementById("emotion").value
let data=JSON.parse(localStorage.getItem("hist")||"[]")

data.unshift({
email:user.email,
emotion:e,
time:new Date().toLocaleString()
})

localStorage.setItem("hist",JSON.stringify(data))
loadHistory()
}

function loadHistory(){
let data=JSON.parse(localStorage.getItem("hist")||"[]")

let html=data.map(i=>`
<div>
${i.time}<br/>
${i.email}<br/>
${i.emotion}
</div>
`).join("")

document.getElementById("historyList").innerHTML=html
}

render()
</script>

</body>
</html>
