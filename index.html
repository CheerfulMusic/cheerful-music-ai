<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cheerful Music AI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box {
      max-width: 720px;
      padding: 40px;
      border-radius: 20px;
      background: #111827;
      box-shadow: 0 10px 30px rgba(0,0,0,.3);
      text-align: center;
    }
    h1 {
      margin-top: 0;
      font-size: 32px;
    }
    p {
      color: #cbd5e1;
      line-height: 1.7;
      font-size: 16px;
    }
    .tag {
      display: inline-block;
      margin-top: 18px;
      padding: 10px 16px;
      border-radius: 999px;
      background: #1d4ed8;
      color: white;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Cheerful Music AI</h1>
    <p>系统首页已经上线成功。</p>
    <p>下一步将接入：情绪输入、音乐生成、视频生成。</p>
    <div class="tag">部署成功</div>
  </div>
</body>
</html>
