<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cheerful Music AI</title>
<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.wrap{max-width:1100px;margin:auto;padding:20px}
.card{background:#121a2b;border-radius:12px;padding:20px;margin-top:20px}
input,textarea,select{width:100%;padding:10px;margin-top:10px;border-radius:8px;background:#0e1626;color:#fff;border:1px solid #333}
button{
  margin-top:10px;
  padding:12px;
  border-radius:8px;
  background:#F93822;
  color:#fff;
  border:none;
  width:100%;
  font-weight:600;
}

button:hover{
  background:#d9321f;
}
.hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
<h1>Cheerful Music AI</h1>

<div>
<button onclick="setLang('zh')">中文</button>
<button onclick="setLang('en')">English</button>
</div>
<div id="login">
<div class="card">
<h2 id="loginTitle"></h2>

<input id="email" placeholder="email" />
<input id="password" type="password" placeholder="password" />

<select id="role">
<option value="admin">Admin</option>
<option value="member">Member</option>
</select>

<button onclick="login()" id="loginBtn"></button>
</div>
</div>

<div id="app" class="hidden">

<div class="card">
<h2 id="createTitle"></h2>

<textarea id="emotion"></textarea>

<select id="platform">
<option value="douyin">Douyin</option>
<option value="tiktok">TikTok</option>
</select>

<select id="style">
<option>孤独治愈</option>
<option>女性情绪</option>
<option>励志成长</option>
</select>

<button onclick="gen()" id="genBtn"></button>

<div id="promptBox"></div>

<button onclick="save()" id="saveBtn"></button>

</div>

<div class="card">
<h3 id="historyTitle"></h3>
<div id="history"></div>
</div>

</div>
<script>

let lang="zh"
let user=null

const t={
zh:{
loginTitle:"登录",
loginBtn:"进入系统",
createTitle:"创作台",
genBtn:"生成Prompt",
saveBtn:"保存",
historyTitle:"历史记录"
},
en:{
loginTitle:"Login",
loginBtn:"Enter",
createTitle:"Create",
genBtn:"Generate",
saveBtn:"Save",
historyTitle:"History"
}
}

function setLang(l){
lang=l
render()
}

function render(){
document.getElementById("loginTitle").innerText=t[lang].loginTitle
document.getElementById("loginBtn").innerText=t[lang].loginBtn
document.getElementById("createTitle").innerText=t[lang].createTitle
document.getElementById("genBtn").innerText=t[lang].genBtn
document.getElementById("saveBtn").innerText=t[lang].saveBtn
document.getElementById("historyTitle").innerText=t[lang].historyTitle
}

function login(){
let email=document.getElementById("email").value||"member1"
let role=document.getElementById("role").value
user={email,role}

document.getElementById("login").classList.add("hidden")
document.getElementById("app").classList.remove("hidden")

loadHistory()
}

function gen(){
let e=document.getElementById("emotion").value
let prompt="very short emotional piano, "+e
document.getElementById("promptBox").innerText=prompt
}

function save(){
let e=document.getElementById("emotion").value
let data=JSON.parse(localStorage.getItem("hist")||"[]")

data.unshift({
email:user.email,
emotion:e,
time:new Date().toLocaleString()
})

localStorage.setItem("hist",JSON.stringify(data))

loadHistory()
}

function loadHistory(){
let data=JSON.parse(localStorage.getItem("hist")||"[]")

let html=data.map(i=>`
<div>
${i.time}<br/>
${i.email}<br/>
${i.emotion}
</div>
`).join("")

document.getElementById("history").innerHTML=html
}

render()

</script>
</body>
</html>
