<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheerful Music AI OS</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d0d0f;color:#fff}
.header{display:flex;justify-content:space-between;align-items:center;padding:24px 40px;background:#16161a;border-bottom:1px solid #2a2a2f}
.logo{font-size:32px;font-weight:700;color:#ff4b2b}
.user{background:#ff4b2b;padding:10px 18px;border-radius:10px}
.wrap{display:flex}
.sidebar{width:250px;background:#121216;padding:24px;height:calc(100vh - 89px)}
.sidebar div{padding:14px 16px;margin-bottom:10px;border-radius:10px;background:#1c1c22}
.main{flex:1;padding:40px}
.card{background:#1a1a20;padding:24px;border-radius:16px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.item{background:#202028;padding:20px;border-radius:14px;text-align:center}
</style>
</head>
<body>
<div class="header">
<div class="logo">Cheerful Music AI OS</div>
<div class="user">管理员</div>
</div>

<div class="wrap">
<div class="sidebar">
<div>AI工作台</div>
<div>AI财务</div>
<div>AI版权</div>
<div>AI发行</div>
<div>AI A&R</div>
<div>AI推广</div>
<div>AI HR</div>
<div>AI法务</div>
<div>AI CEO</div>
</div>

<div class="main">
<div class="card">
<h1>欢迎回来，Snow</h1>
<p>Cheerful Music AI OS 第一阶段</p>
</div>

<div class="grid">
<div class="item">AI工作台</div>
<div class="item">AI财务</div>
<div class="item">AI版权</div>
<div class="item">AI发行</div>
<div class="item">AI A&R</div>
<div class="item">AI推广</div>
<div class="item">AI HR</div>
<div class="item">AI法务</div>
<div class="item">AI CEO</div>
</div>
</div>
</div>
</body>
</html>
