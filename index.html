<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cheerful Music AI</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:linear-gradient(180deg,#0c1018 0%,#121826 100%);
  color:#fff;
}
.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:24px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:16px;
  margin-bottom:24px;
}
.brandbox{
  display:flex;
  align-items:center;
  gap:14px;
}
.logo{
  width:52px;
  height:52px;
  border-radius:16px;
  background:linear-gradient(135deg,#F93822 0%,#ff7a3d 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 10px 30px rgba(249,56,34,.35);
}
.logo svg{
  width:30px;
  height:30px;
  fill:#fff;
}
.brandtitle{
  font-size:28px;
  font-weight:800;
  letter-spacing:.2px;
}
.brandsub{
  font-size:13px;
  color:#aab3c5;
  margin-top:4px;
}
.topactions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.langbtn,.statuspill,.ghostbtn,.mainbtn,.subbtn{
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
}
.langbtn{
  background:#1b2233;
  color:#fff;
  padding:10px 14px;
}
.langbtn:hover{
  background:#242d43;
}
.statuspill{
  background:rgba(249,56,34,.14);
  color:#ff8a7a;
  padding:10px 14px;
}
.hidden{display:none !important}
.grid-login{
  max-width:560px;
  margin:40px auto 0;
}
.card{
  background:rgba(20,27,41,.92);
  border:1px solid rgba(255,255,255,.06);
  backdrop-filter:blur(6px);
  border-radius:24px;
  padding:24px;
  box-shadow:0 16px 50px rgba(0,0,0,.28);
}
.card h2{
  margin:0 0 10px 0;
  font-size:24px;
}
.muted{
  color:#aab3c5;
  font-size:14px;
  line-height:1.7;
}
.label{
  display:block;
  font-size:13px;
  color:#c4cada;
  margin-top:16px;
  margin-bottom:8px;
}
input,textarea,select{
  width:100%;
  background:#0f1522;
  color:#fff;
  border:1px solid rgba(255,255,255,.08);
  border-radius:16px;
  padding:14px 15px;
  font-size:14px;
  outline:none;
}
input:focus,textarea:focus,select:focus{
  border-color:#F93822;
  box-shadow:0 0 0 3px rgba(249,56,34,.14);
}
textarea{
  min-height:96px;
  resize:vertical;
}
.mainbtn{
  width:100%;
  margin-top:16px;
  padding:14px 18px;
  background:#F93822;
  color:#fff;
  box-shadow:0 10px 24px rgba(249,56,34,.28);
}
.mainbtn:hover{
  background:#e5331e;
}
.subbtn{
  width:100%;
  margin-top:12px;
  padding:14px 18px;
  background:#20283a;
  color:#fff;
}
.subbtn:hover{
  background:#293349;
}
.smallnote{
  margin-top:18px;
  padding:14px;
  border-radius:16px;
  background:#0f1522;
  color:#9aa6bf;
  font-size:13px;
  line-height:1.8;
}
.dashboard{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:22px;
}
.sidebar{
  background:rgba(20,27,41,.92);
  border:1px solid rgba(255,255,255,.06);
  border-radius:24px;
  padding:18px;
  height:fit-content;
  box-shadow:0 16px 50px rgba(0,0,0,.28);
}
.sidehead{
  font-size:18px;
  font-weight:800;
  margin-bottom:14px;
}
.menubtn{
  width:100%;
  text-align:left;
  background:transparent;
  color:#fff;
  border:none;
  border-radius:14px;
  padding:12px 14px;
  margin-top:8px;
  cursor:pointer;
  font-size:14px;
}
.menubtn:hover{
  background:#1c2436;
}
.menubtn.active{
  background:rgba(249,56,34,.16);
  color:#ff9f92;
}
.userbox{
  margin-top:20px;
  padding:14px;
  background:#0f1522;
  border-radius:16px;
}
.username{
  font-weight:700;
  margin-bottom:6px;
}
.mainarea{
  display:grid;
  gap:22px;
}
.twocol{
  display:grid;
  grid-template-columns:1.1fr .9fr;
  gap:22px;
}
.row2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.sectiontitle{
  margin:22px 0 10px 0;
  font-size:18px;
  font-weight:800;
}
.box{
  background:#0f1522;
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:14px;
  margin-top:12px;
}
.prompttext{
  white-space:pre-wrap;
  color:#e9edf7;
  font-size:13px;
  line-height:1.8;
}
.resultitem,.historyitem,.teamitem{
  background:#0f1522;
  border:1px solid rgba(255,255,255,.06);
  border-radius:18px;
  padding:14px;
  margin-top:12px;
}
.resultitem strong,.teamitem strong{
  display:block;
  margin-bottom:6px;
}
.tag{
  display:inline-block;
  margin-top:8px;
  margin-right:6px;
  padding:6px 10px;
  font-size:12px;
  border-radius:999px;
  background:rgba(249,56,34,.14);
  color:#ff9f92;
}
.empty{
  color:#8d9ab4;
  font-size:13px;
  line-height:1.7;
}
.footer{
  margin-top:22px;
  text-align:center;
  color:#76829b;
  font-size:12px;
}
@media(max-width:980px){
  .dashboard{grid-template-columns:1fr}
  .twocol{grid-template-columns:1fr}
  .row2{grid-template-columns:1fr}
  .topbar{flex-direction:column;align-items:flex-start}
}
</style>
</head>

            <div class="sectiontitle" id="resultTitle"></div>
            <div id="resultsArea" class="box">

          <div class="card">

      <div id="sectionHistory" class="hidden">

      <div id="sectionAdmin" class="hidden">

          </div>
          <div class="teamitem">
            <strong>member1@cheerfulmusic.com</strong>
            <div class="muted" id="member1Text"></div>
          </div>
          <div class="teamitem">
            <strong>member2@cheerfulmusic.com</strong>
            <div class="muted" id="member2Text"></div>
          </div>
          <div class="teamitem">
            <strong>member3@cheerfulmusic.com</strong>
            <div class="muted" id="member3Text"></div>
          </div>
          <div class="teamitem">
            <strong>member4@cheerfulmusic.com</strong>
            <div class="muted" id="member4Text"></div>
          </div>
          <div class="teamitem">
            <strong>member5@cheerfulmusic.com</strong>
            <div class="muted" id="member5Text"></div>
          </div>
        </div>
      </div>

      <div class="footer" id="footerTip"></div>
    </div>
  </div>
  </div>

<script>

let lang="zh";
let currentUser=null;
let currentPrompt="";
let currentResults=[];

function t(key){return i18n[lang][key]||key;}

function setLang(nextLang){
  lang=nextLang;
  renderTexts();
  renderHistory();
  renderFullHistory();
  renderRoleBadge();
}

function renderTexts(){
  document.getElementById("topSub").textContent=t("topSub");
  document.getElementById("loginTitle").textContent=t("loginTitle");
  document.getElementById("loginDesc").textContent=t("loginDesc");
  document.getElementById("emailLabel").textContent=t("emailLabel");
  document.getElementById("passwordLabel").textContent=t("passwordLabel");
  document.getElementById("roleLabel").textContent=t("roleLabel");
  document.getElementById("loginBtn").textContent=t("loginBtn");
  document.getElementById("demoAccountText").textContent=t("demoAccountText");
  document.getElementById("sidebarTitle").textContent=t("sidebarTitle");
  document.getElementById("menuCreateBtn").textContent=t("menuCreate");
  document.getElementById("menuHistoryBtn").textContent=t("menuHistory");
  document.getElementById("menuAdminBtn").textContent=t("menuAdmin");
  document.getElementById("logoutBtn").textContent=t("logout");
  document.getElementById("currentUserTitle").textContent=t("currentUserTitle");
  document.getElementById("createTitle").textContent=t("createTitle");
  document.getElementById("createDesc").textContent=t("createDesc");
  document.getElementById("emotionLabel").textContent=t("emotionLabel");
  document.getElementById("emotionInput").placeholder=t("emotionPlaceholder");
  document.getElementById("platformLabel").textContent=t("platformLabel");
  document.getElementById("styleLabel").textContent=t("styleLabel");
  document.getElementById("promptBtn").textContent=t("promptBtn");
  document.getElementById("simulateBtn").textContent=t("simulateBtn");
  document.getElementById("saveBtn").textContent=t("saveBtn");
  document.getElementById("promptTitle").textContent=t("promptTitle");
  document.getElementById("resultTitle").textContent=t("resultTitle");
  document.getElementById("resultEmpty").textContent=t("resultEmpty");
  document.getElementById("statusTitle").textContent=t("statusTitle");
  document.getElementById("historyTitle").textContent=t("historyTitle");
  document.getElementById("teamPreviewTitle").textContent=t("teamPreviewTitle");
  document.getElementById("teamPreviewText").textContent=t("teamPreviewText");
  document.getElementById("fullHistoryTitle").textContent=t("fullHistoryTitle");
  document.getElementById("fullHistoryDesc").textContent=t("fullHistoryDesc");
  document.getElementById("adminTitle").textContent=t("adminTitle");
  document.getElementById("adminDesc").textContent=t("adminDesc");
  document.getElementById("adminOwnerText").textContent=t("adminOwnerText");
  document.getElementById("member1Text").textContent=t("memberText");
  document.getElementById("member2Text").textContent=t("memberText");
  document.getElementById("member3Text").textContent=t("memberText");
  document.getElementById("member4Text").textContent=t("memberText");
  document.getElementById("member5Text").textContent=t("memberText");
  document.getElementById("footerTip").textContent=t("footerTip");
  if(!currentUser){
    document.getElementById("statusArea").innerHTML=t("statusInit");
    document.getElementById("promptOutput").textContent=t("promptEmpty");
  }
}

function renderRoleBadge(){
  const badge=document.getElementById("roleBadge");
  if(!currentUser){badge.textContent=t("roleGuest");return;}
  badge.textContent=currentUser.role==="admin"?t("roleAdmin"):t("roleMember");
}

function mockLogin(){
  const email=document.getElementById("loginEmail").value.trim()||"member1@cheerfulmusic.com";
  const role=document.getElementById("loginRole").value;
  currentUser={email,role};
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("appPage").classList.remove("hidden");
  document.getElementById("currentUserName").textContent=email;
  document.getElementById("currentUserRole").textContent=role==="admin"?t("roleAdmin"):t("roleMember");
  const adminBtn=document.getElementById("menuAdminBtn");
  if(role==="admin"){adminBtn.classList.remove("hidden")}else{adminBtn.classList.add("hidden")}
  document.getElementById("statusArea").innerHTML=t("statusInit");
  renderRoleBadge();
  renderHistory();
  renderFullHistory();
  showSection("create");
}

function logout(){
  currentUser=null;
  document.getElementById("loginPage").classList.remove("hidden");
  document.getElementById("appPage").classList.add("hidden");
  renderRoleBadge();
}

function showSection(section){
  document.getElementById("sectionCreate").classList.add("hidden");
  document.getElementById("sectionHistory").classList.add("hidden");
  document.getElementById("sectionAdmin").classList.add("hidden");
  document.getElementById("menuCreateBtn").classList.remove("active");
  document.getElementById("menuHistoryBtn").classList.remove("active");
  document.getElementById("menuAdminBtn").classList.remove("active");
  if(section==="create"){
    document.getElementById("sectionCreate").classList.remove("hidden");
    document.getElementById("menuCreateBtn").classList.add("active");
  }else if(section==="history"){
    document.getElementById("sectionHistory").classList.remove("hidden");
    document.getElementById("menuHistoryBtn").classList.add("active");
  }else if(section==="admin"){
    document.getElementById("sectionAdmin").classList.remove("hidden");
    document.getElementById("menuAdminBtn").classList.add("active");
  }
}

function getBasePrompt(platform,style,emotion){
  const cleanEmotion=emotion&&emotion.trim()?emotion.trim():(platform==="douyin"?"孤独治愈，女性视角，前2秒有情绪":"lonely but healing, female perspective, strong emotion in first 2 seconds");
  if(platform==="douyin"){
    if(style.includes("中国风")) return "very short emotional chinese-style instrumental, instant feeling in first 2 seconds, guzheng and soft ambient texture, elegant and restrained mood, minimal melody, slight echo, no intro, no buildup, suitable for short video, c-pop, inspired by: "+cleanEmotion;
    if(style.includes("励志")) return "very short emotional piano, instant hopeful feeling in first 2 seconds, soft but strong mood, minimal melody, raw and real emotion, no intro, no buildup, perfect for emotional short video, c-pop, inspired by: "+cleanEmotion;
    if(style.includes("女性")) return "very short emotional piano, instant sad feeling in first 2 seconds, lonely and fragile female mood, soft but deep emotion, minimal melody, slight echo, no intro, no buildup, raw and real feeling, perfect for emotional short video, c-pop, inspired by: "+cleanEmotion;
    return "very short emotional piano, instant sad feeling in first 2 seconds, lonely healing mood, soft but deep emotion, minimal melody, slight echo, no intro, no buildup, raw and real feeling, perfect for emotional short video, c-pop, inspired by: "+cleanEmotion;
  }else{
    if(style.includes("中国风")) return "very short emotional chinese fusion instrumental, instant feeling in first 2 seconds, elegant and restrained mood, guzheng texture, minimal melody, no intro, no buildup, suitable for tiktok short video, inspired by: "+cleanEmotion;
    if(style.includes("励志")) return "very short emotional piano, instant hopeful feeling in first 2 seconds, soft but strong emotion, minimal melody, no intro, no buildup, raw and real feeling, perfect for short video, inspired by: "+cleanEmotion;
    if(style.includes("女性")) return "very short emotional piano, instant sad feeling in first 2 seconds, lonely and fragile female mood, soft but deep emotion, minimal melody, slight echo, no intro, no buildup, raw and real feeling, perfect for emotional short video, inspired by: "+cleanEmotion;
    return "very short emotional piano, instant sad feeling in first 2 seconds, lonely healing mood, soft but deep emotion, minimal melody, no intro, no buildup, raw and real feeling, perfect for emotional short video, inspired by: "+cleanEmotion;
  }
}

function generatePrompt(){
  const emotion=document.getElementById("emotionInput").value;
  const platform=document.getElementById("platformSelect").value;
  const style=document.getElementById("styleSelect").value;
  currentPrompt=getBasePrompt(platform,style,emotion);
  document.getElementById("promptOutput").textContent=currentPrompt;
  document.getElementById("statusArea").innerHTML=lang==="zh"
    ?"Prompt 已生成。<br><br>平台："+(platform==="douyin"?"抖音（中文）":"TikTok（英文）")+"<br>风格："+style+"<br>状态：可继续点击“模拟生成音乐结果”"
    :"Prompt generated.<br><br>Platform: "+(platform==="douyin"?"Douyin":"TikTok")+"<br>Style: "+style+"<br>Status: ready to simulate music results";
}

function simulateMusic(){
  if(!currentPrompt) generatePrompt();
  const style=document.getElementById("styleSelect").value;
  const platform=document.getElementById("platformSelect").value;
  currentResults=[
    {title:"Music Result A",descZh:"前2秒情绪很直接，适合短视频停留测试。",descEn:"Strong emotion in the first 2 seconds, suitable for retention testing.",tags:["Hook",style,platform==="douyin"?"Douyin":"TikTok"]},
    {title:"Music Result B",descZh:"更克制、更安静，更适合深夜情绪内容。",descEn:"More restrained and quieter, suitable for late-night emotional content.",tags:["Calm","Night","Loop"]},
    {title:"Music Result C",descZh:"更重复、更抓耳，更适合测试爆款循环感。",descEn:"More repetitive and catchy, suitable for testing viral loop potential.",tags:["Catchy","Repeat","Test"]}
  ];
  document.getElementById("resultsArea").innerHTML=currentResults.map(item=>`
    <div class="resultitem">
      <strong>${item.title}</strong>
      <div class="muted">${lang==="zh"?item.descZh:item.descEn}</div>
      ${item.tags.map(tag=>`<span class="tag">${tag}</span>`).join("")}
    </div>
  `).join("");
  document.getElementById("statusArea").innerHTML=lang==="zh"
    ?"已模拟生成 3 条结果。<br><br>你现在可以保存本次任务，或继续修改情绪方向。"
    :"3 mock results generated.<br><br>You can now save this task or continue adjusting the emotion direction.";
}

function saveCurrent(){
  if(!currentUser) return;
  const emotion=document.getElementById("emotionInput").value.trim()||(lang==="zh"?"未填写情绪":"No emotion entered");
  const platform=document.getElementById("platformSelect").value==="douyin"?"Douyin":"TikTok";
  const style=document.getElementById("styleSelect").value;
  const time=new Date().toLocaleString();
  const item={email:currentUser.email,role:currentUser.role,emotion,platform,style,prompt:currentPrompt||"",time};
  let history=[];
  try{history=JSON.parse(localStorage.getItem("cheerful_team_history")||"[]")}catch(e){history=[]}
  history.unshift(item);
  localStorage.setItem("cheerful_team_history",JSON.stringify(history.slice(0,30)));
  renderHistory();
  renderFullHistory();
  document.getElementById("statusArea").innerHTML=lang==="zh"
    ?"已保存到历史记录。<br><br>当前账号："+currentUser.email
    :"Saved to history.<br><br>Current account: "+currentUser.email;
}

function getAllHistory(){
  try{return JSON.parse(localStorage.getItem("cheerful_team_history")||"[]")}catch(e){return []}
}

function renderHistory(){
  const area=document.getElementById("historyArea");
  const all=getAllHistory();
  if(!currentUser){area.innerHTML='<div class="empty">'+t("historyEmpty")+'</div>';return;}
  const filtered=currentUser.role==="admin"?all.slice(0,5):all.filter(x=>x.email===currentUser.email).slice(0,5);
  if(!filtered.length){area.innerHTML='<div class="empty">'+t("historyEmpty")+'</div>';return;}
  area.innerHTML=filtered.map(item=>`
    <div class="historyitem">
      <strong>${item.time}</strong>
      <div class="muted">${lang==="zh"
        ?"账号："+item.email+"<br>情绪："+item.emotion+"<br>平台："+item.platform+"<br>风格："+item.style
        :"Account: "+item.email+"<br>Emotion: "+item.emotion+"<br>Platform: "+item.platform+"<br>Style: "+item.style}
      </div>
    </div>
  `).join("");
}

function renderFullHistory(){
  const area=document.getElementById("fullHistoryArea");
  const all=getAllHistory();
  if(!currentUser){area.innerHTML='<div class="empty">'+t("historyEmpty")+'</div>';return;}
  const filtered=currentUser.role==="admin"?all:all.filter(x=>x.email===currentUser.email);
  if(!filtered.length){area.innerHTML='<div class="empty">'+t("historyEmpty")+'</div>';return;}
  area.innerHTML=filtered.map(item=>`
    <div class="historyitem">
      <strong>${item.time}</strong>
      <div class="muted">${lang==="zh"
        ?"账号："+item.email+"<br>情绪："+item.emotion+"<br>平台："+item.platform+"<br>风格："+item.style
        :"Account: "+item.email+"<br>Emotion: "+item.emotion+"<br>Platform: "+item.platform+"<br>Style: "+item.style}
      </div>
    </div>
  `).join("");
}

renderTexts();
renderRoleBadge();
renderHistory();
renderFullHistory();
document.getElementById("promptOutput").textContent=t("promptEmpty");
</script>
